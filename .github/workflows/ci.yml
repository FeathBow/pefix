name: CI

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - LICENSE
  push:
    paths-ignore:
      - "**.md"
      - LICENSE

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOTNET_NOLOGO: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Build
        shell: bash
        run: dotnet build "pefix.sln" -c Release -m:1

      - name: Test with coverage
        shell: bash
        run: >-
          dotnet test --project "tests/PeFix.Tests.csproj" --no-build -c Release
          --
          --coverlet
          --coverlet-output-format cobertura
          --coverlet-include "[PeFix]*"
          --coverlet-exclude-by-file "**/obj/**"
          --report-xunit-trx

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.os }}
          path: "**/coverage.cobertura.xml"

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results-${{ matrix.os }}
          path: "**/*.trx"

  publish:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64
          - os: windows-latest
            rid: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Publish
        shell: bash
        run: dotnet publish "src/PeFix/PeFix.csproj" -c Release -r "${{ matrix.rid }}" --output "artifacts/${{ matrix.rid }}"

      - uses: actions/upload-artifact@v7
        with:
          name: pefix-${{ matrix.rid }}
          path: artifacts/${{ matrix.rid }}

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [test, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Pack assets
        shell: bash
        run: |
          cd artifacts
          for dir in pefix-*/; do
            rid="${dir%/}"
            rid="${rid#pefix-}"
            if [[ "$rid" == win-* ]]; then
              (cd "pefix-${rid}" && zip -r "../pefix-${rid}.zip" .)
            else
              tar -C "pefix-${rid}" -czf "pefix-${rid}.tar.gz" .
            fi
          done
          ls -la pefix-*.tar.gz pefix-*.zip

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes "Run \`pefix --help\` for usage." \
            artifacts/pefix-*.tar.gz artifacts/pefix-*.zip
